<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Admin Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:#fff;
}

.header{
    background:#1b1b1b;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h2{
    font-size:22px;
}

.home-icon{
    width:35px;
    height:35px;
    border:2px solid #00b894;
    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#fff;
    font-size:22px;
    cursor:pointer;
}


.admin-panel{
    max-width:600px;
    margin:20px auto;
    padding:15px;
}

.box{
    background:#1e1e1e;
    border-radius:10px;
    padding:15px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#333;
    color:#fff;
    outline:none;
}

textarea{
    resize:none;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#00b894;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#009c7f;
}

.movie-list{
    margin-top:20px;
}

.movie-item{
    background:#222;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}
</style>

</head>

<body>

<div class="header">

<h2>Movie Downloader BOT</h2>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<div class="home-icon" onclick="goHome()">
    <i class="fa-solid fa-house"></i>
</div>

</div>

<div class="admin-panel">

<div class="box">

<label>Movie Title</label>
<input type="text" id="title" placeholder="Movie Name">

<label>Poster URL</label>
<input type="text" id="poster" placeholder="https://example.com/poster.jpg">

<label>Download Link</label>
<input type="text" id="download" placeholder="https://example.com/movie.mp4">

<label>Description</label>
<textarea id="description" rows="5" placeholder="Movie Description"></textarea>

<button onclick="uploadMovie()">
Upload
</button>

</div>



</div>

</div>

</div>

<script>
function goHome(){
    window.location.href="home.html";
}

function uploadMovie(){

let title=document.getElementById("title").value;
let poster=document.getElementById("poster").value;
let download=document.getElementById("download").value;

if(title==""||poster==""||download==""){
alert("Please fill all required fields.");
return;
}

document.getElementById("movieList").innerHTML+=`
<div class="movie-item">
<b>${title}</b><br>
${year}
</div>
`;

alert("Movie Added Successfully!");

document.getElementById("title").value="";
document.getElementById("poster").value="";
document.getElementById("download").value="";
document.getElementById("year").value="";
document.getElementById("description").value="";

}
</script>

</body>
</html>
